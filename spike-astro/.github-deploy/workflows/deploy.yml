# GitHub Pages deploy for the Trainer Demo Deploy spike (Astro).
#
# This workflow lives inside the target repo (e.g. robfoulk/tdd) — not the
# upstream `trainer-demo-deploy` repo. The local `scripts/publish-to-temp-repo.ps1`
# in the upstream repo copies this file into place when it mirrors the spike.
#
# Trigger: manual (workflow_dispatch). Uses the default GITHUB_TOKEN since
# the workflow runs in the same repo it deploys.
name: Deploy spike to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel any in-flight run on new dispatch.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro static export)
        env:
          # Match the production Docusaurus site's baseUrl exactly:
          #   https://microsoftlearning.github.io/trainer-demo-deploy/
          # so deep links and asset paths are identical between the two
          # deployments. NOTE: this means the *target repo* must also be
          # named `trainer-demo-deploy` for GitHub Pages to actually serve
          # the files at this path. If you publish into a repo with a
          # different name (e.g. `tdd`), override BASE_PATH below to match
          # that repo: `BASE_PATH: /${{ github.event.repository.name }}/`.
          BASE_PATH: /trainer-demo-deploy/
          SITE_URL: https://${{ github.repository_owner }}.github.io
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
